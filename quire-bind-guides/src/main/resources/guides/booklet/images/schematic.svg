<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" width="400" height="260">
  <rect width="400" height="260" fill="#ffffff"/>

  <!-- Title -->
  <text x="200" y="20" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#1a1a1a">Booklet — Nested Signatures with Staple</text>

  <!-- 5 concentric folded sheet outlines, widest to narrowest -->
  <!-- Sheet 5 (outermost) -->
  <path d="M 55 225 L 55 42 Q 200 24 345 42 L 345 225 Z"
        fill="#f5f5f5" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Sheet 4 -->
  <path d="M 68 220 L 68 52 Q 200 36 332 52 L 332 220 Z"
        fill="#f5f5f5" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Sheet 3 -->
  <path d="M 81 215 L 81 62 Q 200 48 319 62 L 319 215 Z"
        fill="#f5f5f5" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Sheet 2 -->
  <path d="M 94 210 L 94 72 Q 200 60 306 72 L 306 210 Z"
        fill="#f5f5f5" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Sheet 1 (innermost) -->
  <path d="M 107 205 L 107 82 Q 200 72 293 82 L 293 205 Z"
        fill="#f5f5f5" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- Spine fold centre dashed line -->
  <line x1="200" y1="24" x2="200" y2="232" stroke="#1a1a1a" stroke-width="0.75" stroke-dasharray="4,3"/>

  <!-- Staple — two prongs spanning the fold -->
  <!-- Staple top bar -->
  <rect x="188" y="88" width="24" height="5" rx="1" fill="#3355cc" stroke="none"/>
  <!-- Left prong -->
  <rect x="188" y="93" width="4" height="14" fill="#3355cc" stroke="none"/>
  <!-- Right prong -->
  <rect x="208" y="93" width="4" height="14" fill="#3355cc" stroke="none"/>
  <!-- Prong tips bent inward -->
  <line x1="188" y1="107" x2="194" y2="107" stroke="#3355cc" stroke-width="3"/>
  <line x1="208" y1="107" x2="214" y2="107" stroke="#3355cc" stroke-width="3"/>

  <!-- Second staple lower down -->
  <rect x="188" y="148" width="24" height="5" rx="1" fill="#3355cc" stroke="none"/>
  <rect x="188" y="153" width="4" height="14" fill="#3355cc" stroke="none"/>
  <rect x="208" y="153" width="4" height="14" fill="#3355cc" stroke="none"/>
  <line x1="188" y1="167" x2="194" y2="167" stroke="#3355cc" stroke-width="3"/>
  <line x1="208" y1="167" x2="214" y2="167" stroke="#3355cc" stroke-width="3"/>

  <!-- Spine label -->
  <line x1="200" y1="238" x2="200" y2="246" stroke="#1a1a1a" stroke-width="1"/>
  <text x="200" y="256" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1a1a1a">Spine fold</text>

  <!-- Fore-edge label -->
  <line x1="345" y1="134" x2="357" y2="134" stroke="#1a1a1a" stroke-width="1"/>
  <text x="361" y="138" font-family="sans-serif" font-size="11" fill="#1a1a1a">Fore-edge</text>

  <!-- Legend -->
  <rect x="22" y="240" width="12" height="8" rx="1" fill="#3355cc"/>
  <text x="38" y="248" font-family="sans-serif" font-size="10" fill="#1a1a1a">Staple</text>
</svg>
