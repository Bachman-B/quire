<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" width="400" height="260">
  <rect width="400" height="260" fill="#ffffff"/>

  <!-- Title -->
  <text x="200" y="18" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#1a1a1a">Link Stitch — Two Adjacent Signatures</text>

  <!-- Signature A (left) — spine on right side at x=175 -->
  <polygon points="80,220 175,220 175,45 80,45" fill="#f5f5f5" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- page lines -->
  <line x1="80" y1="200" x2="175" y2="200" stroke="#1a1a1a" stroke-width="0.5"/>
  <line x1="80" y1="178" x2="175" y2="178" stroke="#1a1a1a" stroke-width="0.5"/>
  <line x1="80" y1="156" x2="175" y2="156" stroke="#1a1a1a" stroke-width="0.5"/>
  <line x1="80" y1="134" x2="175" y2="134" stroke="#1a1a1a" stroke-width="0.5"/>

  <!-- Signature B (right) — spine on left side at x=225 -->
  <polygon points="225,220 320,220 320,45 225,45" fill="#f5f5f5" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- page lines -->
  <line x1="225" y1="200" x2="320" y2="200" stroke="#1a1a1a" stroke-width="0.5"/>
  <line x1="225" y1="178" x2="320" y2="178" stroke="#1a1a1a" stroke-width="0.5"/>
  <line x1="225" y1="156" x2="320" y2="156" stroke="#1a1a1a" stroke-width="0.5"/>
  <line x1="225" y1="134" x2="320" y2="134" stroke="#1a1a1a" stroke-width="0.5"/>

  <!-- Sewing holes on spine edges -->
  <!-- Sig A holes (right spine at x=175): head y=65, mid y=133, tail y=200 -->
  <!-- Sig B holes (left spine at x=225): head y=65, mid y=133, tail y=200 -->

  <!-- Hole markers -->
  <!-- Sig A -->
  <circle cx="175" cy="65"  r="4" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <circle cx="175" cy="133" r="4" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <circle cx="175" cy="200" r="4" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Sig B -->
  <circle cx="225" cy="65"  r="4" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <circle cx="225" cy="133" r="4" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <circle cx="225" cy="200" r="4" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- Thread in Sig A (inside): head→tail along spine -->
  <line x1="170" y1="65"  x2="170" y2="200" stroke="#cc3333" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- Thread in Sig B (inside): head→tail -->
  <line x1="230" y1="65"  x2="230" y2="200" stroke="#cc3333" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- Link stitches between signatures -->
  <!-- At mid hole: link stitch loop from sig A to sig B -->
  <path d="M 175,133 C 185,120 215,120 225,133" fill="none" stroke="#cc3333" stroke-width="2"/>
  <path d="M 175,133 C 185,146 215,146 225,133" fill="none" stroke="#cc3333" stroke-width="2"/>

  <!-- Kettle stitch at head (tail of previous sig) — small loop -->
  <path d="M 175,65 C 182,55 218,55 225,65" fill="none" stroke="#cc3333" stroke-width="2"/>
  <!-- Kettle stitch at tail -->
  <path d="M 175,200 C 182,210 218,210 225,200" fill="none" stroke="#cc3333" stroke-width="2"/>

  <!-- Kettle stitch dots -->
  <circle cx="200" cy="53"  r="3" fill="#cc3333"/>
  <circle cx="200" cy="212" r="3" fill="#cc3333"/>

  <!-- Labels -->
  <text x="127" y="36" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1a1a1a">Signature A</text>
  <text x="272" y="36" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1a1a1a">Signature B</text>

  <!-- Link stitch label -->
  <line x1="200" y1="127" x2="200" y2="112" stroke="#1a1a1a" stroke-width="0.75"/>
  <text x="200" y="108" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1a1a1a">Link stitch</text>

  <!-- Kettle stitch labels -->
  <text x="200" y="43" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1a1a1a">Kettle stitch (head)</text>
  <text x="200" y="232" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1a1a1a">Kettle stitch (tail)</text>

  <!-- Legend -->
  <line x1="22" y1="248" x2="48" y2="248" stroke="#cc3333" stroke-width="2"/>
  <text x="52" y="252" font-family="sans-serif" font-size="10" fill="#1a1a1a">Outside thread</text>
  <line x1="145" y1="248" x2="171" y2="248" stroke="#cc3333" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="175" y="252" font-family="sans-serif" font-size="10" fill="#1a1a1a">Inside thread</text>
</svg>
