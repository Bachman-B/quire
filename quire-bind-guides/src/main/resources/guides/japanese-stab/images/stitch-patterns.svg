<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" width="400" height="260">
  <rect width="400" height="260" fill="#ffffff"/>

  <!-- Title -->
  <text x="200" y="16" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#1a1a1a">Japanese Stab — Three Common Patterns</text>

  <!-- Dividers between patterns -->
  <line x1="135" y1="25" x2="135" y2="248" stroke="#1a1a1a" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="268" y1="25" x2="268" y2="248" stroke="#1a1a1a" stroke-width="0.5" stroke-dasharray="3,3"/>

  <!-- =========================================================== -->
  <!-- PATTERN 1: Simple 4-hole (centre panel left, x≈67) -->
  <!-- =========================================================== -->
  <text x="67" y="30" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#1a1a1a">1. Simple</text>

  <!-- Spine edge vertical line -->
  <line x1="67" y1="42" x2="67" y2="240" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- 4 holes at y=65, 110, 155, 200 -->
  <circle cx="67" cy="65"  r="4.5" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <circle cx="67" cy="110" r="4.5" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <circle cx="67" cy="155" r="4.5" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <circle cx="67" cy="200" r="4.5" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- Simple pattern thread:
       Start hole 1 front → down to hole 4 front → wrap tail → up inside → hole 1 → wrap head →
       down front again closing; also individual wraps around head/tail between hole 1&4 -->
  <!-- Front pass: straight down -->
  <line x1="74" y1="65" x2="74" y2="200" stroke="#cc3333" stroke-width="2"/>
  <!-- Back pass (dashed) -->
  <line x1="60" y1="65" x2="60" y2="200" stroke="#cc3333" stroke-width="2" stroke-dasharray="5,3"/>
  <!-- Wrap head (hole 1) -->
  <path d="M 67,65 C 52,50 52,44 60,42 C 65,40 72,42 74,48" fill="none" stroke="#cc3333" stroke-width="1.5"/>
  <!-- Wrap tail (hole 4) -->
  <path d="M 67,200 C 52,215 52,222 60,224 C 65,226 72,224 74,218" fill="none" stroke="#cc3333" stroke-width="1.5"/>

  <!-- =========================================================== -->
  <!-- PATTERN 2: Tortoiseshell (centre panel, x≈200) -->
  <!-- =========================================================== -->
  <text x="200" y="30" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#1a1a1a">2. Tortoiseshell</text>

  <!-- Spine edge -->
  <line x1="200" y1="42" x2="200" y2="240" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- 4 holes -->
  <circle cx="200" cy="65"  r="4.5" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <circle cx="200" cy="110" r="4.5" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <circle cx="200" cy="155" r="4.5" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <circle cx="200" cy="200" r="4.5" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- Tortoiseshell: diagonal stitches between holes on front face, forming diamond/hex shapes -->
  <!-- Vertical spine stitch -->
  <line x1="207" y1="65" x2="207" y2="200" stroke="#cc3333" stroke-width="2"/>
  <line x1="193" y1="65" x2="193" y2="200" stroke="#cc3333" stroke-width="2" stroke-dasharray="5,3"/>

  <!-- Diagonal stitches on front (angled from spine outward and back) -->
  <!-- Between h1 and h2 -->
  <line x1="207" y1="65"  x2="225" y2="87"  stroke="#cc3333" stroke-width="1.5"/>
  <line x1="225" y1="87"  x2="207" y2="110" stroke="#cc3333" stroke-width="1.5"/>
  <!-- Between h2 and h3 -->
  <line x1="207" y1="110" x2="225" y2="132" stroke="#cc3333" stroke-width="1.5"/>
  <line x1="225" y1="132" x2="207" y2="155" stroke="#cc3333" stroke-width="1.5"/>
  <!-- Between h3 and h4 -->
  <line x1="207" y1="155" x2="225" y2="177" stroke="#cc3333" stroke-width="1.5"/>
  <line x1="225" y1="177" x2="207" y2="200" stroke="#cc3333" stroke-width="1.5"/>

  <!-- Left diagonal (back face — dashed) mirror -->
  <line x1="193" y1="65"  x2="175" y2="87"  stroke="#cc3333" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="175" y1="87"  x2="193" y2="110" stroke="#cc3333" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="193" y1="110" x2="175" y2="132" stroke="#cc3333" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="175" y1="132" x2="193" y2="155" stroke="#cc3333" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="193" y1="155" x2="175" y2="177" stroke="#cc3333" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="175" y1="177" x2="193" y2="200" stroke="#cc3333" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- Head / tail wraps -->
  <path d="M 200,65 C 185,50 185,44 193,42 C 198,40 205,42 207,48" fill="none" stroke="#cc3333" stroke-width="1.5"/>
  <path d="M 200,200 C 185,215 185,222 193,224 C 198,226 205,224 207,218" fill="none" stroke="#cc3333" stroke-width="1.5"/>

  <!-- =========================================================== -->
  <!-- PATTERN 3: Hemp Leaf (centre panel right, x≈335) -->
  <!-- =========================================================== -->
  <text x="335" y="30" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#1a1a1a">3. Hemp Leaf</text>

  <!-- Spine edge -->
  <line x1="335" y1="42" x2="335" y2="240" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- 4 holes -->
  <circle cx="335" cy="65"  r="4.5" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <circle cx="335" cy="110" r="4.5" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <circle cx="335" cy="155" r="4.5" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <circle cx="335" cy="200" r="4.5" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- Hemp leaf: star/fan stitches radiating from each hole across neighbours -->
  <!-- Vertical stitches -->
  <line x1="342" y1="65" x2="342" y2="200" stroke="#cc3333" stroke-width="2"/>
  <line x1="328" y1="65" x2="328" y2="200" stroke="#cc3333" stroke-width="2" stroke-dasharray="5,3"/>

  <!-- Fan from hole 1 (y=65): stitches radiating to hole 2 and 3 -->
  <line x1="342" y1="65"  x2="358" y2="110" stroke="#cc3333" stroke-width="1.5"/>
  <line x1="342" y1="65"  x2="358" y2="155" stroke="#cc3333" stroke-width="1.2" stroke-dasharray="3,2"/>

  <!-- Fan from hole 2 (y=110) -->
  <line x1="342" y1="110" x2="358" y2="65"  stroke="#cc3333" stroke-width="1.5"/>
  <line x1="342" y1="110" x2="358" y2="155" stroke="#cc3333" stroke-width="1.5"/>
  <line x1="342" y1="110" x2="358" y2="200" stroke="#cc3333" stroke-width="1.2" stroke-dasharray="3,2"/>

  <!-- Fan from hole 3 (y=155) -->
  <line x1="342" y1="155" x2="358" y2="110" stroke="#cc3333" stroke-width="1.5"/>
  <line x1="342" y1="155" x2="358" y2="200" stroke="#cc3333" stroke-width="1.5"/>
  <line x1="342" y1="155" x2="358" y2="65"  stroke="#cc3333" stroke-width="1.2" stroke-dasharray="3,2"/>

  <!-- Fan from hole 4 (y=200) -->
  <line x1="342" y1="200" x2="358" y2="155" stroke="#cc3333" stroke-width="1.5"/>
  <line x1="342" y1="200" x2="358" y2="110" stroke="#cc3333" stroke-width="1.2" stroke-dasharray="3,2"/>

  <!-- Anchor dots where fans meet the far column -->
  <circle cx="358" cy="65"  r="2" fill="#cc3333"/>
  <circle cx="358" cy="110" r="2" fill="#cc3333"/>
  <circle cx="358" cy="155" r="2" fill="#cc3333"/>
  <circle cx="358" cy="200" r="2" fill="#cc3333"/>

  <!-- Head / tail wraps -->
  <path d="M 335,65 C 320,50 320,44 328,42 C 333,40 340,42 342,48" fill="none" stroke="#cc3333" stroke-width="1.5"/>
  <path d="M 335,200 C 320,215 320,222 328,224 C 333,226 340,224 342,218" fill="none" stroke="#cc3333" stroke-width="1.5"/>

  <!-- Legend at bottom -->
  <line x1="22" y1="252" x2="44" y2="252" stroke="#cc3333" stroke-width="2"/>
  <text x="48" y="256" font-family="sans-serif" font-size="9" fill="#1a1a1a">Front stitch</text>
  <line x1="120" y1="252" x2="142" y2="252" stroke="#cc3333" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="146" y="256" font-family="sans-serif" font-size="9" fill="#1a1a1a">Back stitch</text>
  <line x1="207" y1="252" x2="229" y2="252" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="233" y="256" font-family="sans-serif" font-size="9" fill="#1a1a1a">Spine edge</text>
</svg>
