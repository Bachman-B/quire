<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" width="400" height="260">
  <rect width="400" height="260" fill="#ffffff"/>

  <!-- Title -->
  <text x="200" y="18" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#1a1a1a">Hardcover Binding — Cross-Section (top view)</text>

  <!-- === Left board === -->
  <rect x="22" y="70" width="55" height="148" rx="2" fill="#f5f5f5" stroke="#1a1a1a" stroke-width="2"/>

  <!-- === Pastedown (left) — glued to inside of left board === -->
  <rect x="77" y="74" width="20" height="140" fill="#f5f5f5" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Adhesive fill -->
  <rect x="77" y="74" width="5" height="140" fill="#3355cc" stroke="none"/>

  <!-- === Book block (sewn signatures) — centre === -->
  <!-- Page stack -->
  <rect x="97" y="80" width="106" height="128" fill="#f5f5f5" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Page lines to suggest stacking -->
  <line x1="97" y1="96"  x2="203" y2="96"  stroke="#1a1a1a" stroke-width="0.5"/>
  <line x1="97" y1="112" x2="203" y2="112" stroke="#1a1a1a" stroke-width="0.5"/>
  <line x1="97" y1="128" x2="203" y2="128" stroke="#1a1a1a" stroke-width="0.5"/>
  <line x1="97" y1="144" x2="203" y2="144" stroke="#1a1a1a" stroke-width="0.5"/>
  <line x1="97" y1="160" x2="203" y2="160" stroke="#1a1a1a" stroke-width="0.5"/>
  <line x1="97" y1="176" x2="203" y2="176" stroke="#1a1a1a" stroke-width="0.5"/>
  <line x1="97" y1="192" x2="203" y2="192" stroke="#1a1a1a" stroke-width="0.5"/>

  <!-- Headband top -->
  <rect x="97" y="76" width="106" height="6" rx="1" fill="#cc3333" stroke="none"/>
  <!-- Headband bottom -->
  <rect x="97" y="206" width="106" height="6" rx="1" fill="#cc3333" stroke="none"/>

  <!-- Rounded spine curve -->
  <path d="M 97,80 Q 80,144 97,208" fill="none" stroke="#1a1a1a" stroke-width="2"/>

  <!-- Spine area fill between book block and spine cover -->
  <path d="M 97,80 Q 80,144 97,208 L 77,208 Q 60,144 77,80 Z" fill="#f5f5f5" stroke="#1a1a1a" stroke-width="1"/>

  <!-- === Pastedown (right) === -->
  <rect x="203" y="74" width="20" height="140" fill="#f5f5f5" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="218" y="74" width="5" height="140" fill="#3355cc" stroke="none"/>

  <!-- === Right board === -->
  <rect x="223" y="70" width="55" height="148" rx="2" fill="#f5f5f5" stroke="#1a1a1a" stroke-width="2"/>

  <!-- === Labels === -->
  <!-- Board left -->
  <line x1="49"  y1="68" x2="49"  y2="56" stroke="#1a1a1a" stroke-width="0.75"/>
  <text x="49"  y="52" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1a1a1a">Board</text>

  <!-- Board right -->
  <line x1="250" y1="68" x2="250" y2="56" stroke="#1a1a1a" stroke-width="0.75"/>
  <text x="250" y="52" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1a1a1a">Board</text>

  <!-- Pastedown left -->
  <line x1="87"  y1="68" x2="87"  y2="56" stroke="#1a1a1a" stroke-width="0.75"/>
  <text x="87"  y="52" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1a1a1a">Pastedown</text>

  <!-- Book block -->
  <line x1="150" y1="78" x2="150" y2="56" stroke="#1a1a1a" stroke-width="0.75"/>
  <text x="150" y="52" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1a1a1a">Book block</text>

  <!-- Headband -->
  <line x1="150" y1="74" x2="340" y2="36" stroke="#1a1a1a" stroke-width="0.75"/>
  <text x="343" y="40" font-family="sans-serif" font-size="10" fill="#1a1a1a">Headband</text>

  <!-- Spine -->
  <line x1="78"  y1="144" x2="58" y2="144" stroke="#1a1a1a" stroke-width="0.75"/>
  <text x="55"  y="148" text-anchor="end" font-family="sans-serif" font-size="10" fill="#1a1a1a">Spine</text>

  <!-- Adhesive legend -->
  <rect x="295" y="210" width="10" height="10" fill="#3355cc"/>
  <text x="309" y="220" font-family="sans-serif" font-size="10" fill="#1a1a1a">Adhesive</text>
  <rect x="295" y="226" width="10" height="10" fill="#cc3333"/>
  <text x="309" y="236" font-family="sans-serif" font-size="10" fill="#1a1a1a">Headband</text>
</svg>
