<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" width="400" height="260">
  <rect width="400" height="260" fill="#ffffff"/>

  <!-- Title -->
  <text x="200" y="20" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#1a1a1a">Saddle Stitch — Cross-Section</text>

  <!-- Nested folded sheets, from outermost to innermost -->
  <!-- Sheet 4 (outermost) -->
  <path d="M 60 220 L 60 50 Q 200 30 340 50 L 340 220 Z"
        fill="#f5f5f5" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Sheet 3 -->
  <path d="M 72 215 L 72 60 Q 200 42 328 60 L 328 215 Z"
        fill="#f5f5f5" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Sheet 2 -->
  <path d="M 84 210 L 84 70 Q 200 54 316 70 L 316 210 Z"
        fill="#f5f5f5" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Sheet 1 (innermost) -->
  <path d="M 96 205 L 96 80 Q 200 66 304 80 L 304 205 Z"
        fill="#f5f5f5" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- Spine fold highlight line -->
  <line x1="200" y1="30" x2="200" y2="230" stroke="#1a1a1a" stroke-width="0.75" stroke-dasharray="4,3"/>

  <!-- Stitch marks at fold centre -->
  <circle cx="200" cy="90"  r="3" fill="#cc3333" stroke="none"/>
  <circle cx="200" cy="130" r="3" fill="#cc3333" stroke="none"/>
  <circle cx="200" cy="170" r="3" fill="#cc3333" stroke="none"/>

  <!-- Thread line through stitches -->
  <polyline points="200,85 200,175" stroke="#cc3333" stroke-width="1.5" fill="none"/>

  <!-- Dimension / label arrows -->
  <!-- Spine label -->
  <line x1="200" y1="238" x2="200" y2="248" stroke="#1a1a1a" stroke-width="1"/>
  <text x="200" y="258" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1a1a1a">Spine fold</text>

  <!-- Fore-edge label (right side) -->
  <line x1="340" y1="135" x2="356" y2="135" stroke="#1a1a1a" stroke-width="1"/>
  <text x="360" y="139" font-family="sans-serif" font-size="11" fill="#1a1a1a">Fore-edge</text>

  <!-- Left fore-edge bracket -->
  <line x1="60" y1="135" x2="44" y2="135" stroke="#1a1a1a" stroke-width="1"/>
  <text x="42" y="139" text-anchor="end" font-family="sans-serif" font-size="11" fill="#1a1a1a">Fore-edge</text>

  <!-- Thread legend -->
  <circle cx="22" cy="220" r="4" fill="#cc3333"/>
  <text x="30" y="224" font-family="sans-serif" font-size="10" fill="#1a1a1a">Stitch</text>
</svg>
