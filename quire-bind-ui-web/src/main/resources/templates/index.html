<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>QuireBind</title>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
    <script th:src="@{/js/htmx.min.js}" defer="defer"></script>
</head>
<body>

<header class="app-header">
    <div class="header-inner">
        <a href="/" class="logo">QuireBind</a>
        <nav class="header-nav">
            <a th:href="@{/guides}" class="nav-link">Binding Guides</a>
        </nav>
    </div>
</header>

<div class="wizard-shell">

    <!-- Step indicator -->
    <div id="step-indicator" class="step-indicator">
        <div th:each="n : ${#numbers.sequence(1,4)}"
             th:classappend="${n == step} ? 'active' : (${n lt step} ? 'done' : '')"
             class="step-dot">
            <span class="step-num" th:text="${n}">1</span>
            <span class="step-label" th:switch="${n}">
                <span th:case="1">Upload</span>
                <span th:case="2">Binding</span>
                <span th:case="3">Pages</span>
                <span th:case="4">Export</span>
            </span>
        </div>
        <div class="step-line"></div>
    </div>

    <!-- Wizard content — HTMX swaps this div's innerHTML -->
    <div id="wizard-content">
        <th:block th:if="${step == 1}">
            <div th:replace="~{fragments/upload :: step}"></div>
        </th:block>
        <th:block th:if="${step == 2}">
            <div th:replace="~{fragments/binding :: step}"></div>
        </th:block>
        <th:block th:if="${step == 3}">
            <div th:replace="~{fragments/pages :: step}"></div>
        </th:block>
        <th:block th:if="${step == 4}">
            <div th:replace="~{fragments/export :: step}"></div>
        </th:block>
    </div>

</div>

</body>
</html>
